<body>
  <header>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
  </header>
  <div class="content-wrap">
    <main>
      <div class="main-container">
        <img
          src="toryn.chua@mail.utoronto.ca.jpg"
          alt="profile pic"
          class="profile-pic"
        />
        <div>
          <h1>Toryn Chua</h1>
          <p class="email">toryn.chua@mail.utoronto.ca</p>
        </div>
        <form>
          <label for="email">Your Email:</label>
          <input type="email" id="email"
          name="email" required>

          <label for="feedback">Feedback:</label>
          <textarea name="feedback" id="feedback" rows="4" required></textarea>

          <label for="myfile">Attachment:</label>
          <input type="file" id="myfile" name="myfile">

          <input type="checkbox" id="agreement" name="agreement" value="true">
          <label for="agreement">You agree to receive emails from me</label>

          <button type="submit">Send Feedback</button>
        </form>
      </div>
    </main>
  </div>
</body>
