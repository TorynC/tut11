<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSC309 A1 - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
  </header>
  <div class="content-wrap">
    <main>
      <div class="main-container">
        <img
          src="toryn.chua@mail.utoronto.ca.jpg"
          alt="profile pic"
          class="profile-pic"
        />
        <div>
          <h1>Toryn Chua</h1>
          <a class="email" href="mailto:toryn.chua@mail.utoronto.ca?subject=Bug Found&body=I found the following bug on your website:%0A%0A">toryn.chua@mail.utoronto.ca</a>
        </div>
        <form method="post" action="https://postman-echo.com/post" enctype="multipart/form-data" class="main-form">
          <div class="main-form">
            <label for="email" id="email-label">Your Email:</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="main-form">
            <label for="feedback" id="feedback-label">Feedback:</label>
            <textarea name="feedback" id="feedback" rows="4" placeholder="Enter your feedback here" required></textarea>
          </div>
          <div class="main-form">
            <label for="attachments" id="attachment-label">Attachment:</label>
            <input type="file" id="attachments" name="attachments" required>
          </div>
          <div class="main-form">
            <input type="checkbox" id="consent" name="consent" value="yes">
            <label for="consent" id="consent-label">You agree to receive emails from me</label>
          </div>
          <div class="main-form">
            <button type="submit">Send Feedback</button>
          </div>
        </form>
      </div>
    </main>
    <footer>Copyright 2025 by chuatok.</footer>
  </div>
</body>
</html>
